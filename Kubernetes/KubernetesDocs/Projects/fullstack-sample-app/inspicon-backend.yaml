apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: inspicon-backend
  name: inspicon-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inspicon-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: inspicon-backend
    spec:
      containers:
        - image: hashicorp/http-echo
          args:
            - "-text=Hello from Inspicon Backend"
          name: http-echo
          ports:
            - containerPort: 5678

apiVersion: v1
kind: Service
metadata:
  labels:
    app: mysql
  name: mysql
spec:
  clusterIP: None
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
  selector:
    app: mysql
  type: ClusterIP

# kubectl create service clusterip mysql --tcp=3306:3306 --clusterip="None" --dry-run=client -o yaml > mysql-svc.yaml 
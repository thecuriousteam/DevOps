apiVersion: v1
kind: Pod
metadata:
  labels:
    app: web
    env: qa
  name: pod-d
spec:
  containers:
    - image: nginx
      name: pod-d
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "100Mi"
        limits:
          cpu: "200m"
          memory: "200Mi"
  restartPolicy: Always
